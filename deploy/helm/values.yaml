image:
  repository: ghcr.io/lee-mcfaul2/agent-gateway
  tag: 0.1.0
  pullPolicy: IfNotPresent

replicas: 2

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 2Gi

namespace: gateway
sandboxNamespace: sandbox

opa:
  image: openpolicyagent/opa:1.6.0
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

oidc:
  issuer: ""
  audience: ag-gateway

tokenizer:
  url: http://pii-tokenizer.platform.svc.cluster.local:8443

bundle:
  ref: ""
  cosignSecretName: gateway-cosign-key
  cosignSecretKey: cosign.pub

audit:
  databaseSecretName: gateway-audit-db
  databaseSecretKey: dsn

agentJob:
  image: ghcr.io/lee-mcfaul2/agent-sandbox:0.1.0
  timeoutSeconds: 300

llmProviders:
  anthropicSecretName: gateway-anthropic-key
  anthropicSecretKey: api-key
  openaiSecretName: gateway-openai-key
  openaiSecretKey: api-key

service:
  port: 8000

# LLM Guard sibling-service integration.
# Default: enabled=true. base_url MUST be set in production deployments; the
# gateway boot will fail otherwise (fail-closed). To disable for dev only,
# explicitly set enabled=false and accept that prompt-injection scanning is off.
llm_guard:
  enabled: true
  base_url: ""
  timeout_seconds: 2.0

# Models the gateway will route through LiteLLM. Caller may request any of these
# via the `model` field; otherwise default_model is used.
models:
  default_model: "claude-sonnet-4-6"
  allowed_models: "claude-sonnet-4-6,claude-opus-4-7,gpt-4o"

# Gateway's own MCP-proxy URL, exposed to sandboxes via GATEWAY_MCP_URL env.
gateway_mcp_internal_url: "http://agent-gateway.gateway.svc.cluster.local:8080"
